services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: corpmeet-tg-bot:dev
    container_name: corpmeet-tg-bot-dev
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    image: corpmeet-tg-webapp:dev
    container_name: corpmeet-tg-webapp-dev
    ports:
      - "${WEBAPP_PORT:-8091}:80"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"